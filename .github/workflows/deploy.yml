name: Deploy Lonavala.fun

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 1.5 Diagnostic Secrets Check ──────────────────────────────────────
      - name: Diagnostic Secrets Check
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then echo "VPS_SSH_KEY is empty"; else echo "VPS_SSH_KEY is present"; fi
          if [ -z "$VPS_HOST" ]; then echo "VPS_HOST is empty"; else echo "VPS_HOST is present"; fi
          if [ -z "$VPS_USER" ]; then echo "VPS_USER is empty"; else echo "VPS_USER is present"; fi
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Frontend Build ─────────────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.lonavala.fun

      # ── 3.5 Admin Build ───────────────────────────────────────────────────
      - name: Install Admin Dependencies
        working-directory: admin
        run: npm install

      - name: Build Admin
        working-directory: admin
        run: npm run build
        env:
          VITE_API_URL: https://api.lonavala.fun

      # ── 4. Package Backend ────────────────────────────────────────────────
      - name: Package Backend
        run: |
          tar -czf backend.tar.gz \
            --exclude=backend/node_modules \
            --exclude=backend/.env \
            --exclude=backend/*.log \
            backend/

      # ── 5. SSH Setup ──────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 6. VPS - Ensure directories and tools exist ───────────────────────
      - name: VPS Prerequisites
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            mkdir -p /var/www/lonavala.fun/frontend /var/www/lonavala.fun/backend /var/www/lonavala.fun/admin
            command -v node || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs)
            command -v pm2 || npm install -g pm2
            command -v nginx || (apt-get update -qq && apt-get install -y nginx)
            echo 'Prerequisites done'
          "

      # ── 7. Write Nginx Config on VPS ──────────────────────────────────────
      - name: Configure Nginx
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cat > /etc/nginx/sites-available/lonavala.fun << 'EOF'
          server {
              listen 80;
              server_name lonavala.fun www.lonavala.fun;
              root /var/www/lonavala.fun/frontend;
              index index.html;
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
          }
          server {
              listen 80;
              server_name admin.lonavala.fun;
              root /var/www/lonavala.fun/admin;
              index index.html;
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
          }
          server {
              listen 80;
              server_name api.lonavala.fun;
              location / {
                  proxy_pass http://127.0.0.1:5001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection upgrade;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache_bypass \$http_upgrade;
              }
          }
          EOF
            ln -sf /etc/nginx/sites-available/lonavala.fun /etc/nginx/sites-enabled/lonavala.fun
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx
            echo 'Nginx configured'
          "

      # ── 7.5 Debug Nginx VPS ───────────────────────────────────────────────
      - name: Debug Nginx VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo '=== Nginx Config Files ===' > /tmp/vps_debug.txt
            ls -la /etc/nginx/sites-enabled/ >> /tmp/vps_debug.txt
            echo '=== Content of /etc/nginx/sites-enabled/lonavala.fun ===' >> /tmp/vps_debug.txt
            cat /etc/nginx/sites-enabled/lonavala.fun >> /tmp/vps_debug.txt
            echo '=== Directory structure of /var/www/lonavala.fun ===' >> /tmp/vps_debug.txt
            ls -R /var/www/lonavala.fun >> /tmp/vps_debug.txt
          "
          scp ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/vps_debug.txt ./vps_debug.txt
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add vps_debug.txt
          git commit -m "debug: save vps debug info [skip ci]" || true
          git push origin main || true

      # ── 8. Deploy Frontend ────────────────────────────────────────────────
      - name: Deploy Frontend
        run: |
          rsync -az --delete \
            frontend/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/lonavala.fun/frontend/

      # ── 8.5 Deploy Admin ──────────────────────────────────────────────────
      - name: Deploy Admin
        run: |
          rsync -az --delete \
            admin/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/lonavala.fun/admin/

      # ── 9. Deploy Backend ─────────────────────────────────────────────────
      - name: Deploy Backend
        run: |
          scp backend.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/backend.tar.gz

      # ── 10. Extract & Restart Backend ─────────────────────────────────────
      - name: Restart Backend
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd /var/www/lonavala.fun/backend
            tar -xzf /tmp/backend.tar.gz --strip-components=1 -C .
            rm /tmp/backend.tar.gz
            npm install --omit=dev
            pm2 restart lonavala-backend 2>/dev/null || pm2 start index.js --name lonavala-backend
            pm2 save
            pm2 list
            echo 'Backend deployed!'
          "

      # ── 11. Health Check ──────────────────────────────────────────────────
      - name: Health Check
        run: |
          sleep 5
          curl -so /dev/null -w "lonavala.fun HTTP %{http_code}\n" http://lonavala.fun || true
          curl -so /dev/null -w "admin.lonavala.fun HTTP %{http_code}\n" http://admin.lonavala.fun || true
          curl -so /dev/null -w "api.lonavala.fun HTTP %{http_code}\n" http://api.lonavala.fun || true
